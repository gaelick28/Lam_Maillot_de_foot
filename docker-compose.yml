services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fou2foot_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./storage:/var/www/storage
      - ./public/images:/var/www/public/images
    networks:
      - fou2foot

  nginx:
    image: nginx:alpine
    container_name: fou2foot_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - fou2foot

  db:
    image: mysql:8.0
    container_name: fou2foot_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: maillot
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: fou2foot
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - fou2foot

networks:
  fou2foot:
    driver: bridge

volumes:
  dbdata:
    driver: local